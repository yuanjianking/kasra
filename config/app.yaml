# Kasra Application Configuration
# This file mirrors AppSettings but env vars (KASRA_APP_*) take precedence.

server:
  host: "0.0.0.0"
  port: 8080
  log_level: "info"

database:
  url: "sqlite:///./data/kasra.db"
  # url: "postgresql://user:password@localhost:5432/kasra"

security:
  api_key: "dev-api-key-change-in-production"
  jwt_secret: "change-this-to-a-random-secret"
  rate_limit_rpm: 120
  allowed_origins:
    - "*"

proxy:
  targets:
    - api.anthropic.com
    - api.openai.com
    - api.deepseek.com

https_proxy:
  enabled: false
  host: "0.0.0.0"
  port: 8443

audit:
  retention_days: 90

data:
  dir: "./data"
