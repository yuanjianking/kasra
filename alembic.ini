# =============================================================================
# Kasra — Alembic Database Migration Configuration
# =============================================================================
[alembic]
script_location = alembic
sqlalchemy.url = sqlite:///./data/kasra.db

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Timezone
timezone = UTC

# Logging
log_file = /dev/stderr

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
