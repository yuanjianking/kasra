name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # 1. Backend: lint + typecheck + test
  # ============================================================================
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install ruff mypy

      - name: Lint (ruff)
        run: ruff check app/ tests/ --select=E,F,I,N,W,S

      - name: Format check (ruff)
        run: ruff format app/ tests/ --check

      - name: Type check (mypy)
        run: mypy app/ --python-version ${{ env.PYTHON_VERSION }} --ignore-missing-imports

      - name: Security scan (bandit)
        run: |
          pip install bandit
          bandit -r app/ -ll -x tests/ || true

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ============================================================================
  # 2. Frontend: type check + lint + build
  # ============================================================================
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint (oxlint)
        run: npx oxlint@latest src/

      - name: Build
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ============================================================================
  # 3. Docker: multi-stage build + security scan
  # ============================================================================
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          load: true
          tags: kasra:ci-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - name: Smoke test
        run: |
          docker run -d \
            --name kasra-smoke \
            -p 8090:8090 \
            -e KASRA_APP_API_KEY=ci-test-key \
            -e KASRA_APP_JWT_SECRET=ci-test-secret-must-be-at-least-32-chars!! \
            -e KASRA_AUDIT__ENABLED=false \
            kasra:ci-${{ github.sha }}
          sleep 5
          docker logs kasra-smoke
          curl -f http://localhost:8090/health || (docker logs kasra-smoke && exit 1)
          curl -f http://localhost:8090/v1/rules \
            -H "X-API-Key: ci-test-key" || (docker logs kasra-smoke && exit 1)
          docker stop kasra-smoke

      - name: Security scan image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: kasra:ci-${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          vuln-type: os,library

      # Cache清理
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ============================================================================
  # 4. Dependency audit
  # ============================================================================
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety

      - name: Check dependencies for vulnerabilities
        run: safety check --full-report || true

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit npm dependencies
        run: npm audit --audit-level=high || true
        working-directory: frontend
