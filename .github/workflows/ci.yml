name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install SDK dependencies
        run: |
          cd kasra-sdk
          pip install -e ".[dev]"

      - name: Install App dependencies
        run: |
          cd kasra
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          cd kasra
          pip install ruff
          ruff check app/ tests/ --select=E,F,I,N,W

      - name: Run App tests
        run: |
          cd kasra
          python -m pytest tests/ -v --tb=short

      - name: Run SDK tests
        run: |
          cd kasra-sdk
          python -m pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kasra/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kasra/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint (oxlint)
        run: npx oxlint@latest src/

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker compose -f kasra/docker-compose.yml build

      - name: Smoke test
        run: |
          docker compose -f kasra/docker-compose.yml up -d
          sleep 10
          curl -f http://localhost:8080/health || exit 1
          docker compose -f kasra/docker-compose.yml down
