# Kasra — logrotate configuration
# Place in /etc/logrotate.d/kasra

/var/log/nginx/kasra-*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    sharedscripts
    postrotate
        systemctl reload nginx > /dev/null 2>&1 || true
    endscript
}

/opt/kasra/data/kasra-audit.jsonl {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
