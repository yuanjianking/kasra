# Kasra — Nginx reverse proxy configuration
# Place in /etc/nginx/sites-available/kasra
# ln -s /etc/nginx/sites-available/kasra /etc/nginx/sites-enabled/

upstream kasra_backend {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    server_name kasra.example.com;

    # Redirect HTTP to HTTPS (production)
    # return 301 https://$host$request_uri;

    # --- or for HTTP-only internal deployment: ---
    client_max_body_size 10m;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # Health check (no auth)
    location /health {
        proxy_pass http://kasra_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP SSE endpoint (no buffering)
    location /v1/mcp/ {
        proxy_pass http://kasra_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s;
    }

    # API endpoints
    location /v1/ {
        proxy_pass http://kasra_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API docs
    location /docs {
        proxy_pass http://kasra_backend;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://kasra_backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://kasra_backend;
        proxy_set_header Host $host;
    }

    # Frontend static files
    location / {
        proxy_pass http://kasra_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            proxy_pass http://kasra_backend;
        }
    }

    access_log /var/log/nginx/kasra-access.log;
    error_log /var/log/nginx/kasra-error.log;
}

