# =============================================================================
# Kasra — Nginx Reverse Proxy Configuration (Enterprise)
# =============================================================================
# Place in /etc/nginx/sites-available/kasra.conf
# Then: ln -s /etc/nginx/sites-available/kasra.conf /etc/nginx/sites-enabled/
# =============================================================================

upstream kasra_backend {
    # Round-robin load balancing across multiple Kasra instances
    # Add additional server lines for horizontal scaling
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:8082 max_fails=3 fail_timeout=30s;

    keepalive 32;
}

# =============================================================================
# HTTP → HTTPS redirect
# =============================================================================
server {
    listen 80;
    server_name kasra.example.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

# =============================================================================
# HTTPS server
# =============================================================================
server {
    listen 443 ssl http2;
    server_name kasra.example.com;

    # ── SSL Configuration (Modern Profile) ────────────────────────────────
    ssl_certificate     /etc/ssl/certs/kasra.example.com.pem;
    ssl_certificate_key /etc/ssl/private/kasra.example.com.key;

    # Modern compatibility: TLSv1.2+ only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # DH parameters (generate: openssl dhparam -out /etc/nginx/dhparam.pem 4096)
    ssl_dhparam /etc/nginx/dhparam.pem;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Session cache
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (strict transport security — uncomment after verifying HTTPS works)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Security Headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    # ── Rate Limiting Zones ───────────────────────────────────────────────
    # Define rate limit zones (shared memory)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=scan_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/kasra-access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/kasra-error.log warn;

    # ── Request Size Limits ───────────────────────────────────────────────
    client_max_body_size 12m;
    client_body_buffer_size 128k;
    client_body_timeout 30s;

    # ── Proxy Settings ────────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;

    proxy_connect_timeout 15s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;

    # ── WebSocket / SSE support (for MCP SSE endpoint) ────────────────────
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/css text/xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # ── Location Rules ────────────────────────────────────────────────────

    # Health check (no rate limit)
    location /health {
        access_log off;
        proxy_pass http://kasra_backend;
    }

    # Metrics (internal only — restrict access)
    location /metrics {
        access_log off;
        # allow 10.0.0.0/8;    # Internal network only
        # allow 172.16.0.0/12;
        # deny all;
        proxy_pass http://kasra_backend;
    }

    # API endpoints — rate limited
    location /v1/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://kasra_backend;
    }

    # Scan endpoints — stricter rate limit
    location /v1/scan/ {
        limit_req zone=scan_limit burst=20 nodelay;
        proxy_pass http://kasra_backend;
    }

    # MCP SSE endpoint (SSE needs streaming)
    location /v1/mcp/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
        proxy_pass http://kasra_backend;
    }

    # Static frontend
    location / {
        proxy_pass http://kasra_backend;
    }

    # ── Error Pages ───────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    error_page 429 /429.html;
    location = /429.html {
        return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please try again later."}';
        add_header Content-Type application/json;
    }
}
