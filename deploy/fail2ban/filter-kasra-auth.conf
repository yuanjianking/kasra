# =============================================================================
# Kasra — Fail2Ban Filter: Authentication Failures
# =============================================================================
# Place in: /etc/fail2ban/filter.d/kasra-auth.conf
# =============================================================================
[INCLUDES]
before = common.conf

[Definition]
_daemon = nginx

failregex = ^<HOST>.*POST .* 401 .*Missing or invalid API key.*$
            ^<HOST>.*POST .* 401 .*wrong.*$

ignoreregex =

[Init]
datepattern = {^LN-BEG}
