# =============================================================================
# Kasra — Docker Compose (Production Stack)
# =============================================================================
# Three independent services, each on its own port:
#
#   kasra-api       :8090 — FastAPI REST API (scan, audit, rules, dashboard)
#   kasra-frontend  :8080 — React SPA (SPA routing supported)
#   kasra-mcp       :8091 — FastMCP SSE server (6 security tools)
#   postgres        :5432 — PostgreSQL database (shared across services)
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
# =============================================================================

services:
  # ── REST API server ──────────────────────────────────────────────────────
  kasra-api:
    build:
      context: ..
      dockerfile: kasra/Dockerfile
      target: production
    image: kasra:latest
    container_name: kasra-api
    entrypoint: ["python", "-m", "app"]
    ports:
      - "${KASRA_API_PORT:-8090}:8090"
      - "${KASRA_PROXY_PORT:-8443}:8443"
    volumes:
      - kasra-data:/data
      - ./config:/config:ro
    environment:
      # Database
      - KASRA_APP_DATABASE_URL=postgresql+psycopg2://kasra:${POSTGRES_PASSWORD:?Must set POSTGRES_PASSWORD}@postgres:5432/kasra

      # API services only (no frontend, no MCP mount — they run separately)
      - KASRA_SKIP_FRONTEND=true
      - KASRA_SKIP_MCP=true

      # Security
      - KASRA_APP_API_KEY=${KASRA_API_KEY:?Must set KASRA_API_KEY}
      - KASRA_APP_JWT_SECRET=${KASRA_JWT_SECRET:?Must set KASRA_JWT_SECRET}
      - KASRA_APP_RATE_LIMIT_RPM=${KASRA_RATE_LIMIT_RPM:-120}

      # HTTPS CONNECT proxy (intercepts Claude Code HTTPS traffic)
      - KASRA_APP_HTTPS_PROXY_ENABLED=true
      - KASRA_APP_HTTPS_PROXY_HOST=0.0.0.0
      - KASRA_APP_HTTPS_PROXY_PORT=8443
      - KASRA_APP_PROXY_TARGETS=api.anthropic.com,api.openai.com,api.deepseek.com

      # SDK Engine
      - KASRA_ENGINE__MAX_CONCURRENT_RULES=${KASRA_ENGINE_MAX_CONCURRENT:-50}
      - KASRA_AUDIT__ENABLED=true
      - KASRA_AUDIT__JSONL_PATH=/data/kasra-audit.jsonl

      # Paths
      - KASRA_APP_DATA_DIR=/data
      - KASRA_APP_CONFIG_DIR=/config
      - KASRA_APP_LOG_LEVEL=${KASRA_LOG_LEVEL:-info}
      - KASRA_APP_ALLOWED_ORIGINS=${KASRA_ALLOWED_ORIGINS:-["*"]}
      - KASRA_APP_AUDIT_RETENTION_DAYS=${KASRA_AUDIT_RETENTION_DAYS:-90}

    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: &logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend SPA server ─────────────────────────────────────────────────
  kasra-frontend:
    image: kasra:latest
    container_name: kasra-frontend
    entrypoint: ["uvicorn"]
    command: ["app.frontend_server:app", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "${KASRA_FRONTEND_PORT:-8080}:8080"
    environment:
      - KASRA_API_URL=http://kasra-api:8090
    depends_on:
      - kasra-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -o /dev/null --max-time 3 http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *logging

  # ── MCP SSE server ──────────────────────────────────────────────────────
  kasra-mcp:
    image: kasra:latest
    container_name: kasra-mcp
    entrypoint: ["python", "-m", "app.mcp_server"]
    ports:
      - "${KASRA_MCP_PORT:-8091}:8091"
    volumes:
      - ./config:/config:ro
    environment:
      # Database (same as API — reads rules from DB)
      - KASRA_APP_DATABASE_URL=postgresql+psycopg2://kasra:${POSTGRES_PASSWORD:?Must set POSTGRES_PASSWORD}@postgres:5432/kasra

      # MCP Server
      - KASRA_MCP_PORT=8091
      - KASRA_MCP_HOST=0.0.0.0

      # SDK Engine
      - KASRA_ENGINE__MAX_CONCURRENT_RULES=${KASRA_ENGINE_MAX_CONCURRENT:-50}
      - KASRA_AUDIT__ENABLED=true

      # Paths
      - KASRA_APP_DATA_DIR=/data
      - KASRA_APP_CONFIG_DIR=/config
      - KASRA_APP_LOG_LEVEL=${KASRA_LOG_LEVEL:-info}

      # Auth (needed for health endpoint)
      - KASRA_APP_API_KEY=${KASRA_API_KEY:?Must set KASRA_API_KEY}
      - KASRA_APP_JWT_SECRET=${KASRA_JWT_SECRET:?Must set KASRA_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket;s=socket.socket();s.settimeout(3);s.connect(('localhost',8091));s.close();exit(0)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *logging

  # ── PostgreSQL database ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kasra-postgres
    ports:
      - "${KASRA_PG_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: kasra
      POSTGRES_USER: kasra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Must set POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--data-checksums --auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kasra -d kasra"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging: *logging
    command: >
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=16MB
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
      -c max_connections=50
      -c log_min_duration_statement=200

  # ── Adminer (optional database UI) ────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: kasra-adminer
    ports:
      - "${KASRA_ADMINER_PORT:-8083}:8080"
    depends_on:
      - postgres
    restart: unless-stopped
    logging: *logging

volumes:
  kasra-data:
    name: kasra-data
  postgres-data:
    name: kasra-postgres-data
